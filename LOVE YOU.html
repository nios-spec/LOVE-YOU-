<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>For You ❤️</title>
<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#ffdde1;
    overflow:hidden;
}

.heart{
    position:relative;
    width:220px;
    height:220px;
    background:red;
    transform:rotate(-45deg);
    animation:beat 1s infinite;
}

.heart:before,
.heart:after{
    content:"";
    position:absolute;
    width:220px;
    height:220px;
    background:red;
    border-radius:50%;
}

.heart:before{
    top:-110px;
    left:0;
}

.heart:after{
    left:110px;
    top:0;
}

.text{
    position:absolute;
    color:white;
    font-family:Arial, sans-serif;
    font-size:28px;
    font-weight:bold;
    text-align:center;
    transform:rotate(45deg);
    z-index:10;
}

@keyframes beat{
    0%,100%{transform:rotate(-45deg) scale(1);}
    50%{transform:rotate(-45deg) scale(1.1);}
}
</style>
</head>
<body>
    <div class="heart"></div>
    <div class="text">I LOVE YOU ❤️</div>
</body>
</html>
